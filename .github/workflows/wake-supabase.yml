name: Wake Supabase DB

on:
  schedule:
    # ปลุกทุกวัน 06:00 น. และ 12:00 น. (UTC+7) = 23:00 และ 05:00 UTC
    - cron: '0 23 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:   # รันมือได้จาก GitHub Actions tab

jobs:
  wake:
    name: Unpause & Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ─── ขั้น 1: ปลุก project ถ้า pause ─────────────────────────────
      - name: Restore project (ปลุก DB ถ้า pause อยู่)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/restore")

          echo "Restore status: $STATUS"

          if [ "$STATUS" = "201" ]; then
            echo "✅ Project restored — รอ DB พร้อม 40 วินาที..."
            sleep 40
          elif [ "$STATUS" = "409" ]; then
            echo "ℹ️ Project ทำงานปกติอยู่แล้ว"
          elif [ "$STATUS" = "000" ] || [ "$STATUS" = "" ]; then
            echo "⚠️ ไม่ได้รับ response — อาจไม่ได้ตั้งค่า SUPABASE_ACCESS_TOKEN"
          else
            echo "ℹ️ Status: $STATUS"
          fi

      # ─── ขั้น 2: Ping API เพื่อกัน auto-pause ────────────────────────
      - name: Ping Supabase API
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Ping status: $HTTP"

          # 200/401/404 = server ตอบแล้ว = ปกติ
          if [[ "$HTTP" == "200" || "$HTTP" == "401" || "$HTTP" == "404" ]]; then
            echo "✅ Supabase พร้อมใช้งาน (HTTP $HTTP)"
          else
            echo "❌ ไม่ตอบสนอง (HTTP $HTTP) — อาจยังกำลังปลุก, รอรอบหน้า"
          fi

      # ─── ขั้น 3: สรุป ─────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "======================================="
          echo "Project : ${{ secrets.SUPABASE_PROJECT_REF }}"
          echo "URL     : ${{ secrets.SUPABASE_URL }}"
          echo "เวลา(TH): $(TZ='Asia/Bangkok' date '+%Y-%m-%d %H:%M:%S')"
          echo "======================================="
          echo ""
          echo "Secrets ที่ต้องตั้งค่า (Settings > Secrets > Actions):"
          echo "  SUPABASE_ACCESS_TOKEN — จาก supabase.com/account/tokens"
          echo "  SUPABASE_PROJECT_REF  — yrdtqwqyqtrefjtutzzf"
          echo "  SUPABASE_URL          — https://yrdtqwqyqtrefjtutzzf.supabase.co"
          echo "  SUPABASE_ANON_KEY     — eyJhbGci..."
