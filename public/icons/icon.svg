<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1e3a8a"/>

  <!-- Book (เขตพื้นที่การศึกษา) -->
  <rect x="100" y="140" width="160" height="200" rx="12" fill="#fff" opacity="0.15"/>
  <rect x="108" y="148" width="144" height="184" rx="8" fill="#fff" opacity="0.9"/>
  <!-- Book spine -->
  <rect x="108" y="148" width="16" height="184" rx="4" fill="#3b82f6" opacity="0.8"/>
  <!-- Book lines -->
  <rect x="136" y="176" width="96" height="6" rx="3" fill="#1e3a8a" opacity="0.4"/>
  <rect x="136" y="196" width="80" height="6" rx="3" fill="#1e3a8a" opacity="0.4"/>
  <rect x="136" y="216" width="88" height="6" rx="3" fill="#1e3a8a" opacity="0.4"/>
  <rect x="136" y="236" width="72" height="6" rx="3" fill="#1e3a8a" opacity="0.4"/>
  <rect x="136" y="256" width="84" height="6" rx="3" fill="#1e3a8a" opacity="0.4"/>
  <rect x="136" y="276" width="64" height="6" rx="3" fill="#1e3a8a" opacity="0.4"/>

  <!-- Magnifying glass (นิเทศ/ตรวจสอบ) -->
  <circle cx="340" cy="240" r="90" fill="none" stroke="#fbbf24" stroke-width="28"/>
  <circle cx="340" cy="240" r="62" fill="#fff" opacity="0.15"/>
  <!-- Eye inside lens -->
  <ellipse cx="340" cy="240" rx="38" ry="26" fill="#fbbf24" opacity="0.9"/>
  <circle cx="340" cy="240" r="16" fill="#1e3a8a"/>
  <circle cx="346" cy="234" r="5" fill="#fff" opacity="0.8"/>
  <!-- Handle -->
  <line x1="405" y1="305" x2="450" y2="355" stroke="#fbbf24" stroke-width="28" stroke-linecap="round"/>

  <!-- Star accent (ความเป็นเลิศ) -->
  <polygon points="190,110 198,135 224,135 204,150 212,175 190,160 168,175 176,150 156,135 182,135"
    fill="#fbbf24" opacity="0.9"/>
</svg>
