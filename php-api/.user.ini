; เพิ่มขีดจำกัดอัปโหลดสำหรับไฟล์วิดีโอ (สูงสุด 50MB)
; .user.ini ถูกอ่านโดย PHP-FPM โดยตรง (ต่างจาก .htaccess) จึงไม่ทำให้เกิด 500 error
; การเปลี่ยนแปลงอาจใช้เวลาสักครู่ก่อนมีผล (ค่า default cache คือ 5 นาที)
upload_max_filesize = 60M
post_max_size = 64M
max_execution_time = 300
memory_limit = 128M
